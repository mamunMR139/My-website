<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Singles Near You</title>

<link rel="preconnect" href="https://images.unsplash.com">
<link rel="dns-prefetch" href="https://images.unsplash.com">
<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:linear-gradient(135deg,#c8a7d9,#e7c6ff);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
overflow-x:hidden;
}

.wrapper{
background:white;
width:1100px;
padding:40px;
border-radius:20px;
box-shadow:0 20px 50px rgba(0,0,0,0.2);
text-align:center;
}

h1{
font-size:40px;
font-weight:700;
color:#111;
}

.sub{
margin-top:10px;
color:#555;
font-size:16px;
}

.counter{
margin-top:12px;
color:#ff2d55;
font-weight:600;
font-size:17px;
}

.cards{
margin-top:40px;
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:25px;
}

.card{
width:200px;
border-radius:20px;
overflow:hidden;
background:#fff;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
transition:0.3s;
cursor:pointer;
position:relative;
will-change:transform;
transform:translateZ(0);
}

.card:hover{
transform:translateY(-10px) scale(1.05);
}

.card img{
width:100%;
height:220px;
object-fit:cover;
display:block;
}

.card h3{
padding:14px;
font-size:18px;
color:#222;
}

.online{
position:absolute;
top:10px;
left:10px;
background:#2ecc71;
color:white;
font-size:12px;
padding:5px 10px;
border-radius:20px;
font-weight:600;
}

.cta{
margin-top:40px;
}

.cta a{
background:linear-gradient(90deg,#ff4d4d,#ff8c00,#ffd500,#00d084,#4d7cff);
background-size:300% 300%;
animation:gradient 6s ease infinite;
color:white;
padding:16px 50px;
border-radius:40px;
text-decoration:none;
font-weight:700;
font-size:18px;
display:inline-block;
transition:0.3s;
}

.cta a:hover{
transform:scale(1.05);
}

@keyframes gradient{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.popup{
position:fixed;
bottom:20px;
right:20px;
background:white;
padding:15px 20px;
border-radius:12px;
box-shadow:0 10px 20px rgba(0,0,0,0.2);
opacity:0;
transition:0.4s;
z-index:999;
font-weight:600;
}

.popup.show{
opacity:1;
}

@media(max-width:900px){

.wrapper{
width:100%;
padding:25px;
}

.cards{
gap:15px;
}

.card{
width:150px;
}

.card img{
height:180px;
}

h1{
font-size:30px;
}

.cta a{
padding:14px 35px;
font-size:16px;
}

}

</style>
</head>

<script>

},1500);

let num=147;

setInterval(()=>{

num+=Math.floor(Math.random()*2);

document.getElementById("users").textContent=

},5000);

fetch("https://ipapi.co/json/")
.then(r=>r.json())
.then(d=>{

document.getElementById("country").textContent=
d.country_name||"You";

})
.catch(()=>{

document.getElementById("country").textContent="You";

});

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>fastaccess.site</title>

<link rel="preconnect" href="https://images.unsplash.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

html, body{
height:100%;
margin:0;
padding:0;
}

body{
background:linear-gradient(135deg,#16a34a,#22c55e,#86efac);
min-height:100vh;
overflow-x:hidden;
font-family:Poppins,sans-serif;
padding:30px 15px;
}

.wrapper{
max-width:1200px;
margin:0 auto;
background:#fff;
border-radius:24px;
padding:25px;
box-shadow:0 20px 60px rgba(0,0,0,0.15);
}

nav{
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
gap:15px;
margin-bottom:40px;
}

.logo{
font-size:24px;
font-weight:700;
color:#111;
}

.menu{
display:flex;
flex-wrap:wrap;
gap:15px;
}

.menu a{
text-decoration:none;
color:#666;
font-weight:500;
font-size:15px;
}

.signup{
color:#16a34a!important;
font-weight:700!important;
}

.hero{
display:flex;
align-items:center;
justify-content:space-between;
gap:30px;
flex-wrap:wrap;
}

.left{
flex:1;
min-width:280px;
}

.badge{
display:inline-block;
padding:8px 16px;
border-radius:30px;
background:#dcfce7;
color:#166534;
font-size:14px;
font-weight:600;
margin-bottom:15px;
}

.left h1{
font-size:64px;
line-height:1.05;
font-weight:700;
color:#111;
}

.gradient{
background:linear-gradient(90deg,#16a34a,#22c55e,#4ade80,#86efac);
-webkit-background-clip:text;
color:transparent;
}

.desc{
margin-top:20px;
font-size:17px;
line-height:1.8;
color:#666;
max-width:520px;
}

.cta-buttons{
display:flex;
margin-top:35px;
}

.btn{
text-decoration:none;
padding:16px 26px;
border-radius:50px;
font-size:16px;
font-weight:700;
color:#fff;
background:linear-gradient(90deg,#16a34a,#22c55e,#4ade80,#86efac);
background-size:300% 300%;
animation:gradient 6s ease infinite;
transition:0.3s;
box-shadow:0 10px 25px rgba(0,0,0,0.18);
display:inline-block;
}

.btn:hover{
transform:translateY(-4px) scale(1.04);
}

@keyframes gradient{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.cards{
position:relative;
width:520px;
height:560px;
flex-shrink:0;
}

.card{
position:absolute;
width:210px;
height:290px;
border-radius:26px;
overflow:hidden;
box-shadow:0 20px 40px rgba(0,0,0,0.2);
animation:float 6s infinite ease-in-out;
}

.card img{
width:100%;
height:80%;
object-fit:cover;
display:block;
}

.card p{
padding:12px;
text-align:center;
font-weight:700;
color:#fff;
}

.card1{background:linear-gradient(180deg,#16a34a,#22c55e);left:0;top:50px;z-index:6;}
.card2{background:#86efac;left:120px;top:0;z-index:5;}
.card3{background:#22c55e;left:260px;top:60px;z-index:4;}
.card4{background:#16a34a;left:70px;top:230px;z-index:3;}
.card5{background:#4ade80;left:240px;top:260px;z-index:2;}
.card6{background:#15803d;left:390px;top:220px;z-index:1;}

@keyframes float{
0%{transform:translateY(0px);}
50%{transform:translateY(-14px);}
100%{transform:translateY(0px);}
}

.features{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
margin-top:70px;
}

.feature{
background:#f0fdf4;
padding:25px;
border-radius:22px;
display:flex;
gap:15px;
align-items:flex-start;
}

.icon{
font-size:30px;
}

.feature b{
font-size:18px;
color:#111;
}

.feature p{
margin-top:6px;
font-size:14px;
line-height:1.6;
color:#777;
}

@media(max-width:950px){
.hero{flex-direction:column;text-align:center;}
.left h1{font-size:46px;}
.cards{width:100%;max-width:500px;height:560px;margin-top:20px;}
.features{grid-template-columns:1fr;}
.cta-buttons{justify-content:center;}
}

@media(max-width:600px){
.wrapper{padding:18px;border-radius:18px;}
.left h1{font-size:38px;}
.btn{width:100%;text-align:center;}
.cards{transform:scale(.72);height:430px;}
}

</style>
</head>

<body>

<div class="wrapper">

<nav>
<div class="logo">⚡ fastaccess.site</div>

<div class="menu">
<a href="#">Home</a>
<a href="#">Features</a>
<a href="#">Contact</a>
<a href="#">Login</a>
<a href="#" class="signup">Signup</a>
</div>
</nav>

<div class="hero">

<div class="left">

<div class="badge">🔥 Thousands online now</div>

<h1>Find Love By<br><span class="gradient">Being Yourself</span></h1>

<p class="desc">
Join thousands of real singles chatting every day.
</p>

<div class="cta-buttons">

<a 
href="https://boagwj.hotdatezzone.com/?utm_source=da57dc555e50572d&ban=other&j5=1&j6=1&s1=251359&s2=2250311" 
target="_blank"
rel="noopener noreferrer"
class="btn">
💬 Add Me Your Chat
</a>

</div>

</div>

<div class="cards">

<div class="card card1">
<img src="https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e?w=500&q=80">
<p>Sophia</p>
</div>

<div class="card card2">
<img src="https://images.unsplash.com/photo-1544005313-94ddf0286df2?w=500&q=80">
<p>Emma</p>
</div>

<div class="card card3">
<img src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=500&q=80">
<p>Olivia</p>
</div>

<div class="card card4">
<img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=500&q=80">
<p>Isabella</p>
</div>

<div class="card card5">
<img src="https://images.unsplash.com/photo-1517841905240-472988babdf9?w=500&q=80">
<p>Charlotte</p>
</div>

<div class="card card6">
<img src="https://images.unsplash.com/photo-1517841905240-472988babdf9?w=500&q=80">
<p>Chat</p>
</div>

</div>

</div>

</div>

</body>
</html>
